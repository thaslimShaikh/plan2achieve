{% extends "base.html" %}

{% block content %}

<div class="goal-wrapper text-center">

<h2 class="goal-title">
Hello {{nickname}} 🫶🏻
</h2>

<p class="tagline">
Let’s plan something beautiful today 🌷
</p>

<div class="goal-card mx-auto">

<form action="/dashboard" method="GET" onsubmit="return validateGoal()">


<label class="input-label">

<i data-lucide="target"></i>
What goal do you want to achieve?

</label>

<input 
type="text" 
name="goal"
id="goalInput"
class="form-control nickname-input mb-4"
placeholder="Example: Build a portfolio website"
required
>


<label class="input-label">

<i data-lucide="layers"></i>
Goal Category

</label>

<select name="category" class="form-select nickname-input mb-4">

<option>Personal Growth 🌸</option>
<option>Academic 📚</option>
<option>Health 💪</option>
<option>Skill Development 🧠</option>
<option>Life Experience ✨</option>

</select>


<label class="input-label">

<i data-lucide="clock"></i>
Time to achieve (days)

</label>

<div class="day-spinner mb-4">

<button type="button" class="spin-btn" onclick="decreaseDays()">−</button>

<input 
type="number"
name="days"
id="daysInput"
value="7"
min="1"
max="365"
class="day-input">

<button type="button" class="spin-btn" onclick="increaseDays()">+</button>

</div>


<button class="generate-btn">

Generate My Plan 💕

</button>

</form>

</div>

</div>


<script>

function increaseDays(){

let input=document.getElementById("daysInput");
input.value=parseInt(input.value)+1;

}

function decreaseDays(){

let input=document.getElementById("daysInput");

if(input.value>1){
input.value=parseInt(input.value)-1;
}

}


function validateGoal(){

let goal=document.getElementById("goalInput").value.trim();

if(goal.length===0){

alert("Please enter a goal first 🌸");

return false;

}

return true;

}

</script>

{% endblock %}
