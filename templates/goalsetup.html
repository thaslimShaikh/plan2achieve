{% extends "base.html" %}

{% block content %}

<div class="goal-wrapper text-center">

<h2>Hello {{nickname}} 🫶🏻</h2>
<p>Let’s plan something beautiful today 🌷</p>

<div class="goal-card mx-auto">

<form action="/dashboard" method="GET">

<!-- GOAL INPUT -->
<label>Goal</label>

<input 
type="text" 
name="goal"
id="goalInput"
class="form-control mb-3"
placeholder="Enter your goal"
required
>

<!-- ML SUGGESTION -->
<p id="mlSuggestion" style="color:#c48197;font-weight:600;"></p>


<!-- CATEGORY -->
<label>Category</label>

<select name="category" id="categorySelect" class="form-select mb-3">
<option>Personal Growth 🌸</option>
<option>Academic 📚</option>
<option>Health 💪</option>
<option>Skill Development 🧠</option>
<option>Life Experience ✨</option>
</select>


<!-- DAYS (FIXED 1–3 ONLY) -->
<label>Days</label>

<select name="days" class="form-select mb-3">
<option value="1">1 Day</option>
<option value="2">2 Days</option>
<option value="3" selected>3 Days</option>
</select>


<button class="generate-btn">Generate Plan 💕</button>

</form>

</div>
</div>


<!-- ML + DARK MODE SCRIPT -->
<script>

const goalInput = document.getElementById("goalInput");
const suggestion = document.getElementById("mlSuggestion");
const categorySelect = document.getElementById("categorySelect");

goalInput.addEventListener("input", async () => {

    let goal = goalInput.value.trim();

    if(goal.length < 3){
        suggestion.innerText = "";
        return;
    }

    try {
        let res = await fetch(`/predict_category?goal=${goal}`);
        let data = await res.json();

        if(data.category){
            suggestion.innerText = "✨ Suggested: " + data.category;

            // auto-select in dropdown
            for(let option of categorySelect.options){
                if(option.text.toLowerCase().includes(data.category.toLowerCase())){
                    option.selected = true;
                }
            }
        }

    } catch (e) {
        console.log("ML error", e);
    }

});

</script>


<script src="{{ url_for('static', filename='js/script.js') }}"></script>

{% endblock %}
