{% extends "base.html" %}

{% block content %}

<div class="dashboard">

<!-- SIDEBAR -->

<div class="sidebar">

<h2 class="logo">Plan2Achieve</h2>

<ul>

<li><i data-lucide="home"></i> Home</li>

<li><i data-lucide="target"></i> Goals</li>

<li><i data-lucide="check-circle"></i> Tasks</li>

<li><i data-lucide="bar-chart"></i> Progress</li>

</ul>

</div>


<!-- MAIN CONTENT -->

<div class="main">

<h1 class="dashboard-title">
Hello {{nickname}} 🫶🏻
</h1>

<div class="card-row">

<div class="stat-card">

<h3>Tasks Completed</h3>

<p class="big-number">{{completed}}</p>

</div>

<div class="stat-card">

<h3>Tasks Remaining</h3>

<p class="big-number">{{remaining}}</p>

</div>

<div class="stat-card">

<h3>Consistency</h3>

<p class="big-number">{{consistency}}%</p>

</div>

</div>


<!-- TASK LIST -->

<div class="task-panel">

<h3>Your Goal Tasks</h3>

{% for task in tasks %}

<div class="task-item">
<input type="checkbox">
<span>{{task}}</span>
</div>

{% endfor %}

</div>

</div>

</div>

{% endblock %}
