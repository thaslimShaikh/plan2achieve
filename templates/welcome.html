{% extends "base.html" %}

{% block content %}

<div class="welcome-wrapper text-center">

<h1 class="main-title">Welcome to Plan2Achieve</h1>

<p class="tagline">
Turn your goals into daily achievable actions 🌸
</p>

<div class="welcome-card mx-auto">

<form action="/goalsetup" method="GET" onsubmit="return validateNickname()">

<label class="mb-3 input-label">

<i data-lucide="user"></i>
What should we call you?

</label>

<input
type="text"
name="nickname"
id="nicknameInput"
class="form-control nickname-input"
placeholder="Enter your nickname"
required
>

<button class="start-btn mt-4">

<i data-lucide="arrow-right"></i>
Start Planning

</button>

</form>

</div>

</div>


<script>

function validateNickname(){

let name=document.getElementById("nicknameInput").value.trim();

if(name.length===0){

alert("Please enter your nickname 💕");

return false;

}

return true;

}

</script>

{% endblock %}
